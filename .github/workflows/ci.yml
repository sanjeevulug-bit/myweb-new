name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-secure:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 🐍 Python setup
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 📦 Install tools
      - name: Install dependencies
        run: |
          pip install pytest bandit
          pip install -r requirements.txt || echo "No requirements.txt"

      # 🧪 Run tests
      - name: Run tests
        run: pytest || echo "No tests"

      # 🔐 Security scan
      - name: Run Bandit
        run: bandit -r . || true

      # 🐳 Build Docker image
      - name: Build Docker Image
        run: docker build -t myweb-app .